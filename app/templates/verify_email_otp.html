{% extends 'base.html' %}
{% block title %}Verify Email - Seva Sankalp{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card premium-card border-0 p-4 shadow-sm">
            <div class="card-body text-center">
                
                <div class="mb-4">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="url(#blue-gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--brand-blue-start)" />
                                <stop offset="100%" stop-color="var(--brand-blue-end)" />
                            </linearGradient>
                        </defs>
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>

                <h3 class="card-title mb-2 fw-bold text-gradient">Check Your Email</h3>
                <p class="text-muted mb-4">We've sent a 6-digit One Time Password (OTP) to your email address to verify your account.</p>
                
                <form action="{{ url_for('auth_routes.verify_email_otp') }}" method="POST">
                    
                    <div class="mb-4 text-start">
                        <label class="form-label fw-medium">Enter OTP Code</label>
                        <input type="text" name="otp" class="form-control form-control-lg rounded-3 py-2 text-center fw-bold tracking-wide" placeholder="• • • • • •" required maxlength="6" autofocus>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient-primary w-100 py-2 rounded-3 fw-semibold fs-5 mb-4">Verify Account</button>
                </form>

                <hr class="text-muted mb-4">
                
                <div class="d-flex flex-column align-items-center">
                    <p class="text-muted mb-2">Didn't receive the code?</p>
                    <form method="POST" action="{{ url_for('auth_routes.resend_otp') }}">
                        <button type="submit" class="btn btn-link text-decoration-none fw-medium text-gradient">Resend OTP</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
