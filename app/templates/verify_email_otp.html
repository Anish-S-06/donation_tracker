<!DOCTYPE html>
<html>
<head>
    <title>Verify Email OTP</title>
</head>
<body>
    <h2>Email Verification</h2>

    <form method="POST">
        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>OTP:</label><br>
        <input type="text" name="otp" required><br><br>

        <button type="submit">Verify OTP</button>
    </form>
</body>
</html>
