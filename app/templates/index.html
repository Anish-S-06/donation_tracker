<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donation Tracker Prototype</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4 text-primary">Donation Tracker (Backend Prototype)</h1>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-primary text-white">Create a Resource</div>
                <div class="card-body">
                    <form id="resourceForm">
                        <input type="hidden" id="donor_id" value="1">
                        <div class="mb-3">
                            <label>Title</label>
                            <input type="text" class="form-control" id="title" placeholder="e.g., Winter Coat" required>
                        </div>
                        <div class="mb-3">
                            <label>Description</label>
                            <textarea class="form-control" id="description" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label>Category</label>
                            <input type="text" class="form-control" id="category" value="Clothing" required>
                        </div>
                        <div class="mb-3">
                            <label>Condition</label>
                            <select class="form-select" id="condition">
                                <option>New</option>
                                <option>Like New</option>
                                <option>Good</option>
                                <option>Fair</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Resource</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">Available Resources</div>
                <div class="card-body p-0">
                    <table class="table table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Condition</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="resourceTable">
                            {% for r in resources %}
                            <tr>
                                <td>{{ r.id }}</td>
                                <td>{{ r.title }}</td>
                                <td><span class="badge bg-secondary">{{ r.category }}</span></td>
                                <td>{{ r.condition }}</td>
                                <td><span class="badge bg-success">{{ r.status }}</span></td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="5" class="text-center text-muted py-3">No resources available yet. Create one!</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('resourceForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        donor_id: parseInt(document.getElementById('donor_id').value),
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        category: document.getElementById('category').value,
        condition: document.getElementById('condition').value
    };
    
    const res = await fetch('/resources/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    
    if(res.ok) {
        window.location.reload();
    } else {
        const errorData = await res.json();
        alert('Failed to create resource: ' + (errorData.error || 'Unknown error'));
    }
});
</script>
</body>
</html>
