{% extends 'base.html' %}
{% block title %}Login - Donation Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card premium-card border-0 p-4">
            <div class="card-body">
                <h3 class="card-title text-center mb-4 fw-bold text-gradient">Welcome Back</h3>
                <p class="text-muted text-center mb-4">Log in to manage your donations and requests</p>
                
                <form action="{{ url_for('auth_routes.login') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Email Address</label>
                        <input type="email" name="email" class="form-control rounded-3 py-2" placeholder="name@example.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium">Password</label>
                        <input type="password" name="password" class="form-control rounded-3 py-2" placeholder="Enter your password" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="remember">
                        <label class="form-check-label text-muted" for="remember">Remember me</label>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient-primary w-100 py-2 rounded-3 mt-3 fw-semibold">Sign In</button>
                </form>
                
                <div class="text-center my-4 text-muted">
                    <span>or</span>
                </div>
                
                <!-- Google Social Login -->
                <a href="{{ url_for('auth_routes.google_login') }}" class="btn btn-outline-dark w-100 py-2 rounded-3 d-flex align-items-center justify-content-center fw-medium border-2">
                    <!-- Simple Google SVG Icon -->
                    <svg class="me-2" width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.6z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.9-2.26a5.7 5.7 0 0 1-8.56-3.05H.48v2.33A9 9 0 0 0 9 18z"/>
                        <path fill="#FBBC05" d="M3.5 10.49a5.39 5.39 0 0 1 0-3.41V4.75H.48a9 9 0 0 0 0 8.5L3.5 10.5z"/>
                        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.05A9 9 0 0 0 .48 4.75L3.5 7.08A5.39 5.39 0 0 1 9 3.58z"/>
                    </svg>
                    Sign in with Google
                </a>
                
                <p class="text-center mt-4 mb-0 text-muted">
                    Don't have an account? <a href="{{ url_for('auth_routes.register') }}" class="text-primary fw-medium text-decoration-none">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
