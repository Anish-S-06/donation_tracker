{% extends 'base.html' %}
{% block title %}{{ title }} - Seva Sankalp{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card premium-card border-0 p-4 text-center">
            <div class="card-body">
                {% if status == 'success' %}
                    <div class="d-inline-flex justify-content-center align-items-center bg-success-subtle text-success rounded-circle mb-4" style="width: 80px; height: 80px;">
                        <svg width="40" height="40" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                        </svg>
                    </div>
                {% elif status == 'danger' %}
                    <div class="d-inline-flex justify-content-center align-items-center bg-danger-subtle text-danger rounded-circle mb-4" style="width: 80px; height: 80px;">
                        <svg width="40" height="40" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM8 4a.905.905 0 0 0-.9.995l.35 3.507a.552.552 0 0 0 1.1 0l.35-3.507A.905.905 0 0 0 8 4zm.002 6a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
                        </svg>
                    </div>
                {% else %}
                    <div class="d-inline-flex justify-content-center align-items-center bg-info-subtle text-info rounded-circle mb-4" style="width: 80px; height: 80px;">
                        <svg width="40" height="40" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
                        </svg>
                    </div>
                {% endif %}
                
                <h3 class="card-title mb-3 fw-bold">{{ title }}</h3>
                <p class="text-muted mb-4 fs-5">{{ message }}</p>
                
                <a href="{{ url_for('frontend_routes.index') }}" class="btn btn-gradient-primary px-5 py-2 rounded-3 fw-semibold">Back to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
